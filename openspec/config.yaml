schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  FusionCanvas is an OpenSpec-driven desktop application for Print-on-Demand creators.

  Durable accepted behavior lives under openspec/specs. Do not treat planning PRDs as
  accepted OpenSpec specifications.

  Product planning source material lives under docs/LifeOS/PRD. When proposing,
  designing, or scoping a FusionCanvas change, inspect the relevant PRD files in
  docs/LifeOS/PRD and docs/LifeOS/Roadmap.md before drafting OpenSpec artifacts.
  Prefer the PRDs for product intent, workflow boundaries, acceptance criteria, and
  feature dependencies. Convert only the relevant intent into the new OpenSpec
  change; do not copy the whole PRD set into a proposal.

  Useful starting points:
  - docs/LifeOS/Roadmap.md for phase and feature ordering.
  - docs/LifeOS/PRD/Phase 0 - Foundation.md for foundation scope.
  - docs/LifeOS/PRD/Phase 1 - MVP Creative Workspace.md for MVP scope.
  - docs/LifeOS/PRD/Phase 2 - Product Creation Workflow.md for product workflow scope.
  - docs/LifeOS/PRD/PRD Audit - 2026-06-17.md for known gaps, corrections, and next actions.

  For every user-facing change, also inspect docs/ui-guidelines.md and
  docs/ux-guidelines.md. Use the UI guidelines for visual composition and control
  presentation, and the UX guidelines for interaction behavior, workflow placement,
  state transitions, focus, editing safety, and progressive disclosure.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - For user-facing changes, identify the primary workflow, its expected frequency, and whether it belongs in the main workspace or a focused surface. For non-user-facing changes, state that UX review is not applicable.
  design:
    - For user-facing changes, apply docs/ui-guidelines.md and docs/ux-guidelines.md and resolve the UX preflight before implementation. Cover workspace footprint, progressive disclosure, interaction states, selection, focus, unsaved changes, cancellation, and destructive actions where relevant.
