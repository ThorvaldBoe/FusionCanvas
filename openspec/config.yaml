schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  FusionCanvas is an OpenSpec-driven desktop application for Print-on-Demand creators.

  Durable accepted behavior lives under openspec/specs. Detailed planning advances one
  delivery module at a time. A module is a cohesive, independently verifiable feature
  set with one clear outcome; it is not a fixed feature count or code boundary.

  Start discovery from current user intent, accepted specs, current application state,
  recent verification and retrospectives, and docs/roadmap.md. Resolve goals, examples,
  non-goals, edge cases, assumptions, dependencies, and high-impact decisions before
  implementation. Do not create a separate module-specification document by default.
  Once the module is understood well enough to name and bound, create or refine its
  OpenSpec change and capture each conclusion in its authoritative artifact. Historical
  LifeOS files under docs/LifeOS are optional, potentially stale idea sources only;
  never infer current priority, ordering, requirements, or acceptance criteria from them.

  Each change is a delivery package: proposal.md is the module-level anchor for outcome,
  scope, boundaries, dependencies, risks, rationale, and verification approach; delta
  specs define observable behavior; design.md contains conceptual/functional design plus
  a detailed implementation plan; tasks.md provides bounded steps; verification.md maps
  every acceptance scenario to final evidence. Lower-cost implementation agents must not
  be left to invent product or architecture decisions.

  For every user-facing change, also inspect docs/ui-guidelines.md and
  docs/ux-guidelines.md. Use the UI guidelines for visual composition and control
  presentation, and the UX guidelines for interaction behavior, workflow placement,
  state transitions, focus, editing safety, and progressive disclosure.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - >-
      Define one cohesive delivery module: outcome, included features, dependencies,
      non-goals, risks, verification approach, and why the scope is reviewable. Do not
      specify later modules in detail.
    - >-
      Capture the important decisions from collaborative discovery and identify any
      unresolved high-impact questions. Implementation cannot begin while those questions
      remain.
    - >-
      For user-facing changes, identify the primary workflow, its expected frequency, and
      whether it belongs in the main workspace or a focused surface. For non-user-facing
      changes, state that UX review is not applicable.
  design:
    - >-
      For user-facing changes, apply docs/ui-guidelines.md and docs/ux-guidelines.md and
      resolve the UX preflight before implementation. Cover workspace footprint,
      progressive disclosure, interaction states, selection, focus, unsaved changes,
      cancellation, and destructive actions where relevant.
    - >-
      Include a dedicated Implementation Plan detailed enough for the assigned agent:
      affected layers and likely files or types, responsibility placement,
      data/persistence and UI changes, algorithms and edge cases, sequencing, test
      locations, migration or compatibility work, and decisions not to reopen.
    - >-
      Map each acceptance scenario to a planned verification method. Allocate real desktop
      scenarios by user impact, integration risk, novelty, and information value; use
      deterministic tests for equivalent low-risk variants.
  tasks:
    - >-
      Derive ordered, bounded, independently verifiable tasks from the implementation
      plan. Include artifact correction, criterion-level verification, strict OpenSpec
      validation, and the solution test baseline.
